<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>𝔉ℜ · Vanessa</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
body {
  background:#000; height:100vh;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; font-family:"Courier Prime",monospace; touch-action:none;
}
.scene { perspective:1000px; width:280px; height:500px; }
.card  { width:280px; height:500px; position:relative; will-change:transform; }
.face  { position:absolute; inset:0; border-radius:24px; overflow:hidden; }

/* ── FRENTE ── */
.front {
  background:#f5f0e8;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.front-pattern {
  position:absolute; inset:0;
  display:grid;
  grid-template-columns:repeat(8,1fr);
  grid-template-rows:repeat(14,1fr);
  overflow:hidden; pointer-events:none;
  opacity:0;
}
.front-pattern span {
  display:flex; align-items:center; justify-content:center;
  font-family:"IM Fell English",serif; font-size:10px;
  font-weight:700;
  will-change:color, opacity;
  color: hsl(45,100%,50%);
}
.logo-front {
  font-family:"IM Fell English",serif;
  font-size:74px; color:#1a1005;
  line-height:1; z-index:2; position:relative; letter-spacing:-2px;
}
.notch-top,.notch-bot {
  position:absolute; left:50%; transform:translateX(-50%);
  width:28px; height:14px; background:#000; z-index:10;
}
.notch-top { top:0; border-radius:0 0 14px 14px; }
.notch-bot { bottom:0; border-radius:14px 14px 0 0; }
.front-divider {
  position:absolute; bottom:110px; left:16px; right:16px;
  border-top:1.5px dashed rgba(0,0,0,.15); z-index:3;
}
.front-bottom {
  position:absolute; bottom:0; left:0; right:0; height:100px;
  display:flex; align-items:center; padding:0 20px; gap:12px; z-index:3;
}
.avatar {
  width:44px; height:44px; border-radius:50%;
  object-fit:cover; object-position:center top; flex-shrink:0;
}
.front-bottom .avatar { border:2px solid #1a1005; }
.front-user { font-size:11px; color:#1a1005; font-weight:700; letter-spacing:.5px; line-height:1.6; }
.front-user small { display:block; font-weight:400; font-size:9px; color:#555; }

/* ── TRASERA ── */
.back {
  background:linear-gradient(135deg,#080600,#1a1200,#2a1e00,#1a1200,#080600);
  display:none;
}
.holo {
  position:absolute; inset:-20px;
  background:linear-gradient(105deg,
    transparent 20%, rgba(212,175,55,.12) 30%,
    rgba(255,215,0,.28) 40%, rgba(184,142,4,.18) 50%,
    rgba(255,223,100,.32) 60%, rgba(212,175,55,.1) 70%,transparent 80%);
  animation:holoA 4s ease-in-out infinite alternate; mix-blend-mode:screen;
}
@keyframes holoA {
  0%  { transform:translateX(-30px) rotate(-3deg); opacity:.7; }
  100%{ transform:translateX(20px)  rotate(2deg);  opacity:1;  }
}
.holo2 {
  position:absolute; inset:0;
  background:repeating-linear-gradient(45deg,transparent,transparent 8px,
    rgba(212,175,55,.04) 8px,rgba(212,175,55,.04) 9px);
}
.fresnel {
  position:absolute; inset:0; border-radius:24px;
  box-shadow:inset 0 0 30px rgba(212,175,55,.18),
             inset 2px 0 18px rgba(255,223,100,.12),
             inset -2px 0 18px rgba(255,223,100,.12);
  pointer-events:none; z-index:5;
}
.logo-back {
  position:absolute; top:42%; left:50%; transform:translate(-50%,-50%);
  font-family:"IM Fell English",serif; font-size:100px; color:transparent;
  -webkit-text-stroke:1.5px rgba(212,175,55,.8);
  letter-spacing:-3px; z-index:4; white-space:nowrap;
  animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse {
  0%,100%{ opacity:.8; filter:drop-shadow(0 0 8px rgba(212,175,55,.4)); }
  50%    { opacity:1;  filter:drop-shadow(0 0 20px rgba(255,215,0,.7)); }
}
.back-content {
  position:absolute; inset:0; padding:28px 22px 0; z-index:6;
  display:flex; flex-direction:column;
}
.lbl { font-size:8px; color:rgba(212,175,55,.55); letter-spacing:2px; text-transform:uppercase; margin-bottom:2px; }
.val { font-size:14px; color:rgba(255,215,0,.95); font-weight:700; letter-spacing:1px; line-height:1.3; margin-bottom:10px; }
.val.big { font-size:20px; }
.back-hdr { display:flex; justify-content:space-between; align-items:flex-start; }
.logo-sm  { font-family:"IM Fell English",serif; font-size:22px; color:rgba(212,175,55,.9); }
.hdivider { border:none; border-top:1px dashed rgba(212,175,55,.2); margin:6px 0; }
.socials  { display:flex; flex-direction:column; gap:5px; margin-top:2px; }
.srow     { display:flex; align-items:center; gap:8px; }
.srow span{ font-size:9.5px; color:rgba(212,175,55,.8); letter-spacing:.4px; }
.back-divider {
  position:absolute; bottom:110px; left:16px; right:16px;
  border-top:1px dashed rgba(212,175,55,.2); z-index:7;
}
.back-bottom {
  position:absolute; bottom:0; left:0; right:0; height:100px;
  display:flex; align-items:center; padding:0 20px; gap:12px; z-index:7;
}
.back-bottom .avatar { border:1.5px solid rgba(212,175,55,.6); filter:sepia(20%) brightness(1.1); }
.back-user       { font-size:10px; color:rgba(212,175,55,.9); font-weight:700; letter-spacing:.5px; }
.back-user small { display:block; font-weight:400; font-size:8.5px; color:rgba(212,175,55,.5); margin-top:1px; }

.hint {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  color:rgba(212,175,55,.3); font-size:10px; letter-spacing:3px;
  text-transform:uppercase; pointer-events:none;
  animation:fadeH 1s ease 3.5s forwards;
}
@keyframes fadeH{ to{ opacity:0; } }
</style>
</head>
<body>
<div class="scene">

              <circle cx="12" cy="12" r="4" stroke="rgba(212,175,55,0.8)" stroke-width="1.8"/>
              <circle cx="17.5" cy="6.5" r="1.2" fill="rgba(212,175,55,0.8)"/>
            </svg>
            <span>_isv.anessa</span>
          </div>
          <div class="srow">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path d="M12 3C8 3 5 6 5 9.5c0 2 .9 3.8 2.3 5C6.5 17 7.5 19 9.5 20.5c1.2.9 2.3 1.3 2.5 1.3s1.3-.4 2.5-1.3c2-1.5 3-3.5 2.2-6 1.4-1.2 2.3-3 2.3-5C19 6 16 3 12 3z" stroke="rgba(212,175,55,0.8)" stroke-width="1.5" stroke-linecap="round"/>

      </div>

  </div>
</div>
<div class="hint">toca · arrastra · inclina</div>

<script>
(function(){

  // ── Paleta tornasol anclada al dorado ──
  // Parte del dorado puro y viaja por tonos que combinan, regresa al dorado
  // Todos los extremos del espectro son cálidos/complementarios del dorado
  var PALETTE = [
    [45,  100, 55],   // dorado puro  ← inicio
    [38,   95, 52],   // ámbar oscuro
    [30,   90, 48],   // cobre dorado
    [22,   85, 50],   // bronce naranja
    [15,   80, 52],   // terracota dorada
    [52,   90, 48],   // lima dorada
    [72,   70, 42],   // olivo dorado
    [160,  55, 42],   // teal oscuro dorado
    [195,  65, 50],   // acero azul (contraste máximo)
    [280,  60, 55],   // lila dorado
    [330,  75, 58],   // rosa champagne
    [45,  100, 70],   // champagne claro
    [45,  100, 55],   // dorado puro  ← cierre
  ];

  function lerpHSL(a, b, t){
    var dh = b[0] - a[0];
    if(dh >  180) dh -= 360;
    if(dh < -180) dh += 360;
    return [
      a[0] + dh * t,
      a[1] + (b[1]-a[1]) * t,
      a[2] + (b[2]-a[2]) * t
    ];
  }

  function paletteColor(t){
    t = ((t % 1) + 1) % 1;
    var n  = PALETTE.length - 1;
    var fi = t * n;
    var i  = Math.floor(fi);
    var f  = fi - i;
    var c  = lerpHSL(PALETTE[i], PALETTE[Math.min(i+1, n)], f);
    return 'hsl('+c[0].toFixed(1)+','+c[1].toFixed(1)+'%,'+c[2].toFixed(1)+'%)';
  }

  // ── Setup patrón ──
  var pat  = document.getElementById('pat');
  var COLS = 8, ROWS = 14, TOTAL = COLS * ROWS;
  var spans = [];
  for(var i=0;i<TOTAL;i++){
    var s=document.createElement('span');
    s.textContent='𝔉ℜ';
    pat.appendChild(s);
    spans.push(s);
  }

  var spanPos = spans.map(function(_,i){
    var col = i % COLS;
    var row = Math.floor(i / COLS);
    return { cx: col/(COLS-1), cy: row/(ROWS-1) };
  });

  var card  = document.getElementById('card');
  var front = document.getElementById('faceFront');
  var back  = document.getElementById('faceBack');

  var rotX=0, rotY=0, velX=0, velY=0;
  var flipped=false, dragging=false;
  var mouseMoved=false, touchMoved=false;
  var px=0, py=0;
  var autoAngle=0, autoActive=true, autoTimer=null;
  var flipLocked=false;

  // ── updatePattern: tornasol anclado al dorado ──
  // Cuando rotY ≈ 0 o 360 → frente directo → patrón invisible
  // Cuando rotY se acerca a 90/270 (canto) → patrón brillante
  // Color base = dorado; según ángulo exacto deriva a colores complementarios
  function updatePattern(ny, nx){
    var rad = ny * Math.PI / 180;

    // intensity: 0 al frente (0°/360°) y al revés (180°), máx en canto (90°/270°)
    // Usamos |sin| para que sea simétrico; potencia para hacerlo más dramático
    var sinVal = Math.abs(Math.sin(rad));
    var intensity = Math.pow(sinVal, 0.7);  // más suave que ^1.2 → visible antes

    pat.style.opacity = intensity;

    if(intensity < 0.01) return;

    // ── Fase del tornasol ──
    // rotY cercano a 0° → basePhase ≈ 0 → dorado puro
    // rotY aumenta → basePhase sube → colores derivados
    // Normalizamos en [0, 0.5] para que vaya del dorado a los colores y regrese
    // (la paleta ya es cíclica dorado→…→dorado, así que t∈[0,1] da el ciclo completo)
    var basePhase = (ny / 360);   // 0→1 al girar 360°

    // El tilt X añade un offset pequeño que desplaza los colores horizontalmente
    var tiltPhase = nx * 0.06;   // nx normalizado [-1,1]

    spans.forEach(function(s, i){
      var pos = spanPos[i];

      // Offset diagonal por posición → efecto de "barrido" al girar
      // La diagonal hace que la irisación se mueva como luz real
      var spatialOffset = pos.cx * 0.22 + pos.cy * 0.08;

      var phase = basePhase + tiltPhase + spatialOffset;
      var color = paletteColor(phase);

      s.style.color = color;

      // Textura: pequeña modulación de opacidad por posición + ángulo
      // Crea "franjas" de luz como en una tarjeta holográfica real
      var stripe = Math.sin((pos.cx * 6 + pos.cy * 3) * Math.PI + rad * 4);
      var localIntensity = intensity * (0.65 + 0.35 * stripe);
      s.style.opacity = Math.max(0, Math.min(1, localIntensity));
    });
  }

  function updateFaces(){
    var ny = ((rotY % 360) + 360) % 360;
    var nx = rotX / 55;
    var showFront = (ny < 90 || ny >= 270);
    if(flipped) showFront = !showFront;

    front.style.display = showFront ? 'flex' : 'none';
    back.style.display  = showFront ? 'none' : 'block';
    back.style.transform = showFront ? '' : 'scaleX(-1)';

    if(showFront){
      updatePattern(ny, nx);
    } else {
      pat.style.opacity = 0;
    }
  }

  function render(){
    card.style.transform =
      'rotateX('+rotX.toFixed(3)+'deg) rotateY('+rotY.toFixed(3)+'deg)';
    updateFaces();
  }

  function loop(){
    if(autoActive && !dragging){
      autoAngle += 0.35;
      var tx = Math.sin(autoAngle * Math.PI / 180 * 0.4) * 9;
      rotX += (tx - rotX) * 0.04;
      rotY += 0.28;
    } else if(!dragging){
      velX *= 0.9; velY *= 0.9;
      rotX += velX; rotY += velY;
      rotX = Math.max(-55, Math.min(55, rotX));
    }
    render();
    requestAnimationFrame(loop);
  }

  function stopAuto(){
    autoActive=false;
    clearTimeout(autoTimer);
    autoTimer=setTimeout(function(){ autoActive=true; }, 5000);
  }

  function doFlip(){
    if(flipLocked) return;
    flipLocked=true; flipped=!flipped;
    card.style.transition='transform 0.6s cubic-bezier(0.4,0,0.2,1)';
    rotY+=180; render();
    setTimeout(function(){ card.style.transition=''; flipLocked=false; }, 660);
  }

  // Mouse
  card.addEventListener('mousedown',function(e){
    if(flipLocked) return;
    dragging=true; mouseMoved=false;
    px=e.clientX; py=e.clientY; velX=0; velY=0; stopAuto(); e.preventDefault();
  });
  document.addEventListener('mousemove',function(e){
    if(!dragging) return;
    var dx=e.clientX-px, dy=e.clientY-py;
    if(Math.abs(dx)>3||Math.abs(dy)>3) mouseMoved=true;
    velY=dx*0.42; velX=-dy*0.42;
    rotY+=velY; rotX=Math.max(-55,Math.min(55,rotX+velX));
    px=e.clientX; py=e.clientY;
  });
  document.addEventListener('mouseup',function(){
    if(!dragging) return; dragging=false;
    if(!mouseMoved) doFlip();
  });

  // Touch
  card.addEventListener('touchstart',function(e){
    if(flipLocked) return;
    dragging=true; touchMoved=false;
    px=e.touches[0].clientX; py=e.touches[0].clientY;
    velX=0; velY=0; stopAuto();
  },{passive:true});
  card.addEventListener('touchmove',function(e){
    if(!dragging) return;
    var dx=e.touches[0].clientX-px, dy=e.touches[0].clientY-py;
    if(Math.abs(dx)>4||Math.abs(dy)>4) touchMoved=true;
    velY=dx*0.45; velX=-dy*0.45;
    rotY+=velY; rotX=Math.max(-55,Math.min(55,rotX+velX));
    px=e.touches[0].clientX; py=e.touches[0].clientY;
    e.preventDefault();
  },{passive:false});
  card.addEventListener('touchend',function(){
    if(!dragging) return; dragging=false;
    if(!touchMoved) doFlip();
  },{passive:true});

  // Giroscopio
  function startGyro(){
    window.addEventListener('deviceorientation',function(e){
      if(dragging||autoActive) return;
      var gx=Math.max(-40,Math.min(40,((e.beta||0)-45)*0.35));
      var gy=(e.gamma||0)*0.5;
      rotX+=(gx-rotX)*0.05; rotY+=(gy-rotY)*0.05;
    });
  }
  if(window.DeviceOrientationEvent){
    if(typeof DeviceOrientationEvent.requestPermission==='function'){
      document.addEventListener('touchend',function ask(){
        DeviceOrientationEvent.requestPermission()
          .then(function(r){ if(r==='granted') startGyro(); }).catch(function(){});
        document.removeEventListener('touchend',ask);
      },{once:true,passive:true});
    } else { startGyro(); }
  }

  loop();
})();
</script>
</body>
</html>
